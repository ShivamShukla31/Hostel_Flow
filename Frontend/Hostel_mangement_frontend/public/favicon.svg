<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gMark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gFlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="120" fill="#050816"/>

  <!-- Subtle border glow -->
  <rect width="512" height="512" rx="120" fill="none" stroke="#3B82F6" stroke-width="3" opacity="0.35"/>

  <!-- H left vertical bar -->
  <rect x="118" y="136" width="68" height="240" rx="20" fill="url(#gMark)"/>

  <!-- H right vertical bar -->
  <rect x="326" y="136" width="68" height="240" rx="20" fill="url(#gMark)"/>

  <!-- Flow crossbar -->
  <rect x="118" y="226" width="276" height="52" rx="26" fill="url(#gFlow)"/>

  <!-- Flow state dots -->
  <circle cx="192" cy="252" r="12" fill="#050816" opacity="0.55"/>
  <circle cx="256" cy="252" r="12" fill="#050816" opacity="0.55"/>
  <circle cx="320" cy="252" r="12" fill="#050816" opacity="0.55"/>

  <!-- Upward chevron accent -->
  <polyline points="370,98 406,62 442,98" fill="none" stroke="#06B6D4" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="406" y1="62" x2="406" y2="134" stroke="#06B6D4" stroke-width="14" stroke-linecap="round"/>

</svg>
